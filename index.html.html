<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FREE - Lucky Spin</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}

body{
  background:url("https://i.ibb.co/d0Rj3zmn/image.png") no-repeat center/cover fixed;
}

.hero{text-align:center;padding:40px;}
.neon-text{
  color:#fff;
  text-shadow:0 0 5px #00f7ff,0 0 15px #00f7ff;
}

.btn{
  padding:12px 30px;
  background:linear-gradient(45deg,#ff416c,#ff4b2b);
  border-radius:50px;
  color:#fff;
  border:none;
  cursor:pointer;
}

.lucky-spin{text-align:center;margin-top:20px;}

.wheel-container{
  margin:auto;
  width:300px;
  height:300px;
  position:relative;
}

.pointer{
  position:absolute;
  top:-10px;
  left:50%;
  transform:translateX(-50%);
  border-left:15px solid transparent;
  border-right:15px solid transparent;
  border-bottom:30px solid yellow;
  z-index:10;
}
</style>
</head>
<body>

<div class="hero">
<h1 class="neon-text">PUTAR RODA HADIAH!</h1>
</div>

<div class="lucky-spin">
<div class="wheel-container">
<div class="pointer"></div>
<canvas id="wheel"></canvas>
</div>
<br>
<button id="spin-btn" class="btn">PUTAR!</button>
<p id="result" class="neon-text"></p>
</div>

<script>
const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");

const segments = ["10RB","5RB","SCATTER","FREE SPIN","1JT","COBA LAGI"];
const colors = ["#ff4b2b","#ff416c","#00f7ff","#39ff14","#b026ff","#ffdd00"];

let startAngle = 0;
let spinning = false;

// resize ringan
function resizeCanvas(){
  canvas.width = 300;
  canvas.height = 300;
}
resizeCanvas();

function drawWheel(){
  const center = canvas.width/2;
  const radius = canvas.width/2;
  const arc = (2*Math.PI)/segments.length;

  ctx.clearRect(0,0,canvas.width,canvas.height);

  for(let i=0;i<segments.length;i++){

    // slice warna
    ctx.beginPath();
    ctx.fillStyle = colors[i];
    ctx.moveTo(center,center);
    ctx.arc(center,center,radius,startAngle+i*arc,startAngle+(i+1)*arc);
    ctx.fill();

    // ===== TEXT =====
    ctx.save();
    ctx.translate(center, center);

    let angle = startAngle + i * arc + arc / 2;
    let normalized = angle % (2*Math.PI);

    ctx.rotate(angle);

    // biar teks ga kebalik
    if(normalized > Math.PI/2 && normalized < 3*Math.PI/2){
      ctx.rotate(Math.PI);
    }

    ctx.fillStyle = "#fff";
    ctx.strokeStyle = "#000";
    ctx.lineWidth = 3;

    ctx.font = `bold ${Math.floor(radius/10)}px sans-serif`;
    ctx.textAlign = "center";

    ctx.strokeText(segments[i], 0, -radius + 60);
    ctx.fillText(segments[i], 0, -radius + 60);

    ctx.restore();
  }
}

drawWheel();

document.getElementById("spin-btn").onclick = function(){
  if(spinning) return;
  spinning = true;

  const spinAngle = Math.random()*3000 + 4000;
  const duration = 4000;
  let start = null;

  function animate(t){
    if(!start) start = t;

    const progress = t - start;
    const rotation = easeOut(progress,0,spinAngle,duration);

    startAngle = rotation * Math.PI / 180;

    drawWheel();

    if(progress < duration){
      requestAnimationFrame(animate);
    } else {
      finishSpin();
    }
  }

  function finishSpin(){
    const degrees = (startAngle*180/Math.PI + 90) % 360;
    const index = Math.floor((360 - degrees)/(360/segments.length)) % segments.length;

    document.getElementById("result").innerHTML =
    "🎉 Kamu mendapatkan: <b>"+segments[index]+"</b>";

    spinning = false;
  }

  requestAnimationFrame(animate);
}

function easeOut(t,b,c,d){
  t/=d;
  t--;
  return c*(t*t*t+1)+b;
}
</script>

</body>
</html>
